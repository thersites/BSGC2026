<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Free Zones — World Map</title>
  </head>
  <body>
    <calcite-shell>
      <calcite-navigation slot="header">
        <calcite-navigation-logo
          slot="logo"
          heading="AI-Free Zones"
          description="Discover where AI hasn't taken over"
        ></calcite-navigation-logo>
      </calcite-navigation>

      <calcite-shell-panel slot="panel-start" position="start" width-scale="m">
        <calcite-panel heading="Safest Places from AI">

          <calcite-block
            id="detail-block"
            heading="Country Detail"
            expanded
          >
            <div id="detail-content"></div>
          </calcite-block>

          <calcite-block
            id="compare-block"
            heading="Comparison"
            expanded
            hidden
          >
            <calcite-action
              id="clear-btn"
              slot="control"
              icon="x"
              text="Clear"
              title="Clear comparison"
            ></calcite-action>
            <div id="compare-content"></div>
          </calcite-block>

          <calcite-block
            id="ranked-block"
            heading="All Countries by AI Exposure"
            expanded
          >
            <calcite-list
              id="ranked-list"
              selection-mode="none"
              label="Ranked countries by AI presence"
            ></calcite-list>
          </calcite-block>

        </calcite-panel>
      </calcite-shell-panel>

      <div id="map-container"></div>
    </calcite-shell>

    <!-- Legend overlay — added to view.ui "bottom-right" by initMap.js -->
    <div id="map-legend" class="map-legend-widget">
      <div class="map-legend-title">AI Presence</div>
      <div class="legend">
        <div class="legend-item">
          <span class="legend-swatch swatch-none"></span>
          <span>0–20 &mdash; Virtually no AI</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-low"></span>
          <span>21–40 &mdash; Low</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-moderate"></span>
          <span>41–60 &mdash; Moderate</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-high"></span>
          <span>61–80 &mdash; High</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-saturated"></span>
          <span>81–100 &mdash; AI-saturated</span>
        </div>
        <div class="legend-item">
          <span class="legend-swatch swatch-nodata"></span>
          <span>No data</span>
        </div>
      </div>
    </div>

    <div id="tooltip" class="map-tooltip" role="tooltip" aria-hidden="true"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
